# TaskTemplate Configuration - Rails Example App
#
# Payments Namespace: Process Refund Workflow
# Demonstrates namespace isolation with same workflow name in different namespaces
#
# Template: payments/process_refund:2.1.0
# Implementation: Rails Example App
# Blog Post: Post 04 - Team Scaling (Namespace Isolation)
#
# Business Workflow Pattern (4 steps):
# 1. Validate Payment Eligibility: Check if payment can be refunded via gateway
# 2. Process Gateway Refund: Execute refund through payment processor
# 3. Update Payment Records: Update internal payment status and history
# 4. Notify Customer: Send refund confirmation to customer
#
# This demonstrates the payments team's direct refund workflow
#
---
name: process_refund
namespace_name: payments_rb
version: 1.0.0
description: "Process payment gateway refunds with direct API integration - Post 04 Team Scaling"
metadata:
  author: Payments Team
  blog_post: post_04
  tags:
    - namespace:payments
    - pattern:refund_processing
    - dependencies:linear
    - implementation:rails_example
task_handler:
  callable: Payments::ProcessRefundHandler
  initialization:
    timeout_seconds: 60
    max_retries: 3
input_schema:
  type: object
  required:
    - payment_id
    - refund_amount
  properties:
    payment_id:
      type: string
      description: "Payment gateway transaction ID"
      pattern: "^pay_[a-zA-Z0-9_]+$"
    refund_amount:
      type: number
      minimum: 0
      description: "Amount to refund in cents"
    refund_reason:
      type: string
      enum:
        - customer_request
        - fraud
        - system_error
        - chargeback
      description: "Reason for the refund"
    partial_refund:
      type: boolean
      default: false
      description: "Whether this is a partial refund"
    customer_email:
      type: string
      description: "Customer email address for notification"
    correlation_id:
      type: string
      description: "Correlation ID for tracking across systems"
steps:
  - name: validate_payment_eligibility
    description: "Check if payment can be refunded via gateway"
    result_schema:
      type: object
      required:
        - payment_id
        - order_ref
        - eligible
        - refund_amount
        - validated_at
      properties:
        payment_validated:
          type: boolean
        payment_id:
          type: string
        original_amount:
          type: number
        refund_amount:
          type: number
        payment_method:
          type: string
        gateway_provider:
          type: string
        eligibility_status:
          type: string
        validation_timestamp:
          type: string
        namespace:
          type: string
        eligibility_id:
          type: string
        order_ref:
          type: string
        amount:
          type: number
        refund_percentage:
          type: number
        reason:
          type: string
        customer_email:
          type: string
        fraud_score:
          type: number
        fraud_flagged:
          type: boolean
        within_refund_window:
          type: boolean
        eligible:
          type: boolean
        validated_at:
          type: string
    handler:
      callable: Payments::StepHandlers::ValidatePaymentEligibilityHandler
    dependencies: []
    retry:
      retryable: true
      max_attempts: 3
      backoff: exponential
      initial_delay: 2
      max_delay: 30

  - name: process_gateway_refund
    description: "Execute refund through payment processor"
    result_schema:
      type: object
      required:
        - refund_id
        - payment_id
        - amount_processed
        - gateway_status
        - processed_at
      properties:
        refund_processed:
          type: boolean
        refund_id:
          type: string
        payment_id:
          type: string
        refund_amount:
          type: number
        refund_status:
          type: string
        gateway_transaction_id:
          type: string
        gateway_provider:
          type: string
        processed_at:
          type: string
        estimated_arrival:
          type: string
        namespace:
          type: string
        gateway_txn_id:
          type: string
        settlement_id:
          type: string
        authorization_code:
          type: string
        order_ref:
          type: string
        amount_processed:
          type: number
        currency:
          type: string
        gateway:
          type: string
        gateway_status:
          type: string
        processor_response_code:
          type: string
        processor_message:
          type: string
        settlement_batch:
          type: string
    handler:
      callable: Payments::StepHandlers::ProcessGatewayRefundHandler
    dependencies:
      - validate_payment_eligibility
    retry:
      retryable: true
      max_attempts: 2
      backoff: exponential
      initial_delay: 5
      max_delay: 60

  - name: update_payment_records
    description: "Update internal payment status and history"
    result_schema:
      type: object
      required:
        - record_id
        - payment_id
        - records_updated
        - recorded_at
      properties:
        records_updated:
          type: boolean
        payment_id:
          type: string
        refund_id:
          type: string
        record_id:
          type: string
        payment_status:
          type: string
        refund_status:
          type: string
        history_entries_created:
          type: integer
        updated_at:
          type: string
        namespace:
          type: string
        journal_id:
          type: string
        ledger_entries:
          type: array
          items:
            type: object
            required:
              - type
              - amount
              - currency
              - timestamp
            properties:
              type:
                type: string
              amount:
                type: number
              currency:
                type: string
              timestamp:
                type: string
        order_ref:
          type: string
        amount_recorded:
          type: number
        gateway_txn_id:
          type: string
        reconciliation_status:
          type: string
        fiscal_period:
          type: string
        recorded_at:
          type: string
    handler:
      callable: Payments::StepHandlers::UpdatePaymentRecordsHandler
    dependencies:
      - process_gateway_refund
    retry:
      retryable: true
      max_attempts: 3
      backoff: exponential
      initial_delay: 2
      max_delay: 30

  - name: notify_customer
    description: "Send refund confirmation to customer"
    result_schema:
      type: object
      required:
        - notification_id
        - message_id
        - status
        - sent_at
      properties:
        notification_sent:
          type: boolean
        customer_email:
          type: string
        message_id:
          type: string
        notification_type:
          type: string
        sent_at:
          type: string
        delivery_status:
          type: string
        refund_id:
          type: string
        refund_amount:
          type: number
        namespace:
          type: string
        notification_id:
          type: string
        recipient:
          type: string
        channel:
          type: string
        subject:
          type: string
        body_preview:
          type: string
        template:
          type: string
        references:
          type: object
        status:
          type: string
    handler:
      callable: Payments::StepHandlers::NotifyCustomerHandler
    dependencies:
      - update_payment_records
    retry:
      retryable: true
      max_attempts: 5
      backoff: exponential
      initial_delay: 2
      max_delay: 60
