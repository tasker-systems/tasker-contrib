# TaskTemplate Configuration - Rails Example App
#
# Data Pipeline Namespace: Analytics Pipeline Workflow
# Demonstrates DAG pattern with parallel extraction and aggregation
#
# Template: data_pipeline/analytics_pipeline:1.0.0
# Implementation: Rails Example App
# Blog Post: Post 02 - Data Pipeline Resilience
#
# Business Workflow Pattern (8 steps):
# DAG Structure - Parallel Extracts → Sequential Transforms → Aggregation → Insights
#
# Extract Phase (3 parallel steps):
# 1. Extract Sales Data: Pull sales records from database
# 2. Extract Inventory Data: Pull inventory records from warehouse system
# 3. Extract Customer Data: Pull customer records from CRM
#
# Transform Phase (3 sequential steps):
# 4. Transform Sales: Calculate daily totals and product summaries
# 5. Transform Inventory: Calculate warehouse summaries and reorder alerts
# 6. Transform Customers: Calculate tier analysis and value segmentation
#
# Aggregate Phase (1 step):
# 7. Aggregate Metrics: Combine all transformed data sources
#
# Insights Phase (1 step):
# 8. Generate Insights: Create actionable business intelligence
#
# This demonstrates parallel execution, dependency resolution, and data aggregation
# across multiple branches in a DAG workflow.
#
---
name: analytics_pipeline
namespace_name: data_pipeline_rb
version: 1.0.0
description: "Analytics ETL pipeline with parallel extraction and aggregation - Post 02 Data Pipeline"
metadata:
  author: Data Team
  blog_post: post_02
  tags:
    - namespace:data_pipeline
    - pattern:dag_workflow
    - pattern:parallel_execution
    - dependencies:aggregate_convergence
    - implementation:rails_example
task_handler:
  callable: DataPipeline::AnalyticsPipelineHandler
  initialization:
    timeout_seconds: 120
    max_retries: 2
input_schema:
  type: object
  properties:
    pipeline_id:
      type: string
      description: "Unique pipeline execution identifier"
    date_range:
      type: object
      properties:
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
steps:
  # EXTRACT PHASE - 3 parallel steps (no dependencies)
  - name: extract_sales_data
    description: "Extract sales records from database"
    result_schema:
      type: object
      required:
        - source
        - record_count
        - records
        - total_revenue
        - total_quantity
        - extracted_at
        - date_range
      properties:
        source:
          type: string
        record_count:
          type: integer
        records:
          type: array
          items:
            type: object
            required:
              - date
              - product
              - category
              - region
              - quantity
              - unit_price
              - total
            properties:
              date:
                type: string
              product:
                type: string
              category:
                type: string
              region:
                type: string
              quantity:
                type: integer
              unit_price:
                type: number
              total:
                type: number
        total_amount:
          type: number
        total_revenue:
          type: number
        total_quantity:
          type: integer
        date_range:
          type: object
          required:
            - start_date
            - end_date
          properties:
            start_date:
              type: string
            end_date:
              type: string
        extracted_at:
          type: string
    handler:
      callable: DataPipeline::StepHandlers::ExtractSalesDataHandler
    dependencies: []
    retry:
      retryable: true
      max_attempts: 3
      backoff: exponential
      initial_delay: 2
      max_delay: 30

  - name: extract_inventory_data
    description: "Extract inventory records from warehouse system"
    result_schema:
      type: object
      required:
        - source
        - record_count
        - records
        - extracted_at
      properties:
        source:
          type: string
        record_count:
          type: integer
        records:
          type: array
          items:
            type: object
        total_quantity:
          type: integer
        total_sessions:
          type: integer
        total_conversions:
          type: integer
        overall_conversion_rate:
          type: number
        warehouses:
          type: array
          items:
            type: string
        products_tracked:
          type: integer
        extracted_at:
          type: string
    handler:
      callable: DataPipeline::StepHandlers::ExtractInventoryDataHandler
    dependencies: []
    retry:
      retryable: true
      max_attempts: 3
      backoff: exponential
      initial_delay: 2
      max_delay: 30

  - name: extract_customer_data
    description: "Extract customer records from CRM"
    result_schema:
      type: object
      required:
        - source
        - record_count
        - records
        - extracted_at
      properties:
        source:
          type: string
        record_count:
          type: integer
        records:
          type: array
          items:
            type: object
        total_customers:
          type: integer
        total_lifetime_value:
          type: number
        avg_lifetime_value:
          type: number
        tier_breakdown:
          type: object
          properties:
            standard:
              type: integer
            premium:
              type: integer
            gold:
              type: integer
        total_inventory_value:
          type: number
        low_stock_alerts:
          type: integer
        extracted_at:
          type: string
    handler:
      callable: DataPipeline::StepHandlers::ExtractCustomerDataHandler
    dependencies: []
    retry:
      retryable: true
      max_attempts: 3
      backoff: exponential
      initial_delay: 2
      max_delay: 30

  # TRANSFORM PHASE - 3 sequential steps (each depends on its extract)
  - name: transform_sales
    description: "Transform sales data for analytics"
    result_schema:
      type: object
      required:
        - records_processed
        - total_revenue
        - transformed_at
        - record_count
      properties:
        record_count:
          type: integer
        daily_sales:
          type: object
        product_sales:
          type: object
        total_revenue:
          type: number
        by_category:
          type: object
        by_region:
          type: object
        top_category:
          type: string
        total_categories:
          type: integer
        total_regions:
          type: integer
        records_processed:
          type: integer
        transformed_at:
          type: string
    handler:
      callable: DataPipeline::StepHandlers::TransformSalesHandler
    dependencies:
      - extract_sales_data
    retry:
      retryable: true
      max_attempts: 2
      backoff: exponential
      initial_delay: 2
      max_delay: 20

  - name: transform_inventory
    description: "Transform inventory data for analytics"
    result_schema:
      type: object
      required:
        - records_processed
        - transformed_at
        - record_count
      properties:
        record_count:
          type: integer
        warehouse_summary:
          type: object
        product_inventory:
          type: object
        total_quantity_on_hand:
          type: integer
        reorder_alerts:
          type: integer
        by_source:
          type: object
        by_page:
          type: object
        best_converting_source:
          type: string
        total_sources:
          type: integer
        total_pages:
          type: integer
        records_processed:
          type: integer
        transformed_at:
          type: string
    handler:
      callable: DataPipeline::StepHandlers::TransformInventoryHandler
    dependencies:
      - extract_inventory_data
    retry:
      retryable: true
      max_attempts: 2
      backoff: exponential
      initial_delay: 2
      max_delay: 20

  - name: transform_customers
    description: "Transform customer data for analytics"
    result_schema:
      type: object
      required:
        - records_processed
        - transformed_at
        - record_count
      properties:
        record_count:
          type: integer
        tier_analysis:
          type: object
        value_segments:
          type: object
        total_lifetime_value:
          type: number
        avg_customer_value:
          type: number
        by_warehouse:
          type: object
        by_category:
          type: object
        low_stock_items:
          type: array
        low_stock_count:
          type: integer
        total_skus:
          type: integer
        records_processed:
          type: integer
        transformed_at:
          type: string
    handler:
      callable: DataPipeline::StepHandlers::TransformCustomersHandler
    dependencies:
      - extract_customer_data
    retry:
      retryable: true
      max_attempts: 2
      backoff: exponential
      initial_delay: 2
      max_delay: 20

  # AGGREGATE PHASE - 1 step (depends on all 3 transforms - DAG convergence)
  - name: aggregate_metrics
    description: "Aggregate metrics from all transformed sources"
    result_schema:
      type: object
      required:
        - total_records_processed
        - sources_included
        - aggregated_at
        - data_sources
        - aggregation_complete
      properties:
        total_revenue:
          type: number
        total_inventory_quantity:
          type: integer
        total_customers:
          type: integer
        total_customer_lifetime_value:
          type: number
        sales_transactions:
          type: integer
        inventory_reorder_alerts:
          type: integer
        revenue_per_customer:
          type: number
        inventory_turnover_indicator:
          type: number
        aggregation_complete:
          type: boolean
        sources_included:
          type: integer
        sales_summary:
          type: object
        traffic_summary:
          type: object
        inventory_summary:
          type: object
        total_records_processed:
          type: integer
        data_sources:
          type: array
          items:
            type: string
        aggregated_at:
          type: string
    handler:
      callable: DataPipeline::StepHandlers::AggregateMetricsHandler
    dependencies:
      - transform_sales
      - transform_inventory
      - transform_customers
    retry:
      retryable: true
      max_attempts: 2
      backoff: exponential
      initial_delay: 2
      max_delay: 20

  # INSIGHTS PHASE - 1 step (depends on aggregation)
  - name: generate_insights
    description: "Generate business insights from aggregated data"
    result_schema:
      type: object
      required:
        - insight_count
        - recommendations_count
        - total_metrics_analyzed
        - generated_at
        - pipeline_complete
      properties:
        insights:
          type: array
          items:
            type: object
            required:
              - type
              - severity
              - message
              - metric
              - recommendation
            properties:
              type:
                type: string
              severity:
                type: string
              message:
                type: string
              metric:
                type: string
              recommendation:
                type: string
        health_score:
          type: object
          required:
            - score
            - max_score
            - rating
          properties:
            score:
              type: integer
            max_score:
              type: integer
            rating:
              type: string
            details:
              type: string
        total_metrics_analyzed:
          type: integer
        pipeline_complete:
          type: boolean
        insight_count:
          type: integer
        health_status:
          type: string
        recommendations_count:
          type: integer
        generated_at:
          type: string
    handler:
      callable: DataPipeline::StepHandlers::GenerateInsightsHandler
    dependencies:
      - aggregate_metrics
    retry:
      retryable: true
      max_attempts: 2
      backoff: exponential
      initial_delay: 2
      max_delay: 20
