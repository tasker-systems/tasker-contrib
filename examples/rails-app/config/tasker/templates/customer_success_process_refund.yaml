# TaskTemplate Configuration - Rails Example App
#
# Customer Success Namespace: Process Refund Workflow
# Demonstrates namespace isolation with same workflow name in different namespaces
#
# Template: customer_success/process_refund:1.3.0
# Implementation: Rails Example App
# Blog Post: Post 04 - Team Scaling (Namespace Isolation)
#
# Business Workflow Pattern (5 steps):
# 1. Validate Refund Request: Validate customer refund request details
# 2. Check Refund Policy: Verify request complies with refund policies
# 3. Get Manager Approval: Route to manager for approval if needed
# 4. Execute Refund Workflow: Call payments team refund workflow (cross-namespace)
# 5. Update Ticket Status: Update customer support ticket
#
# This demonstrates the customer success team's approval-based refund workflow
# with cross-namespace coordination to the payments team
#
---
name: process_refund
namespace_name: customer_success_rb
version: 1.0.0
description: "Process customer service refunds with approval workflow - Post 04 Team Scaling"
metadata:
  author: Customer Success Team
  blog_post: post_04
  tags:
    - namespace:customer_success
    - pattern:approval_workflow
    - dependencies:linear_with_approval
    - cross_namespace:payments
    - implementation:rails_example
task_handler:
  callable: CustomerSuccess::ProcessRefundHandler
  initialization:
    timeout_seconds: 90
    max_retries: 3
input_schema:
  type: object
  required:
    - ticket_id
    - customer_id
    - refund_amount
    - customer_email
  properties:
    ticket_id:
      type: string
      description: "Customer support ticket ID"
    customer_id:
      type: string
      description: "Customer identifier"
    refund_amount:
      type: number
      minimum: 0
      description: "Requested refund amount in cents"
    refund_reason:
      type: string
      description: "Customer's reason for refund"
    agent_notes:
      type: string
      description: "Internal agent notes"
    requires_approval:
      type: boolean
      default: true
      description: "Whether manager approval is required"
    order_ref:
      type: string
      description: "Order reference for the refund"
    customer_email:
      type: string
      description: "Customer email address for notifications"
    correlation_id:
      type: string
      description: "Correlation ID for tracking across systems"
    payment_id:
      type: string
      description: "Payment ID for cross-team workflow coordination"
steps:
  - name: validate_refund_request
    description: "Validate customer refund request details"
    result_schema:
      type: object
      required:
        - request_validated
        - ticket_id
        - customer_id
        - ticket_status
        - customer_tier
        - original_purchase_date
        - payment_id
        - validation_timestamp
        - namespace
        - validation_id
        - order_ref
        - refund_amount
        - reason
        - order_data
        - refund_percentage
        - is_partial_refund
        - is_valid
        - validated_at
      properties:
        request_validated:
          type: boolean
        ticket_id:
          type: string
        customer_id:
          type: string
        ticket_status:
          type: string
        customer_tier:
          type: string
        original_purchase_date:
          type: string
        payment_id:
          type: string
        validation_timestamp:
          type: string
        namespace:
          type: string
        validation_id:
          type: string
        order_ref:
          type: string
        refund_amount:
          type: number
        reason:
          type: string
        order_data:
          type: object
        refund_percentage:
          type: number
        is_partial_refund:
          type: boolean
        is_valid:
          type: boolean
        validated_at:
          type: string
    handler:
      callable: CustomerSuccess::StepHandlers::ValidateRefundRequestHandler
    dependencies: []
    retry:
      retryable: true
      max_attempts: 3
      backoff: exponential
      initial_delay: 2
      max_delay: 30

  - name: check_refund_policy
    description: "Verify request complies with refund policies"
    result_schema:
      type: object
      required:
        - policy_checked
        - policy_compliant
        - customer_tier
        - refund_window_days
        - days_since_purchase
        - within_refund_window
        - requires_approval
        - max_allowed_amount
        - policy_checked_at
        - namespace
        - check_id
        - policy_passed
        - violations
        - warnings
        - auto_approve
        - requires_manager_approval
        - approval_level
        - applied_policy
        - checked_at
      properties:
        policy_checked:
          type: boolean
        policy_compliant:
          type: boolean
        customer_tier:
          type: string
        refund_window_days:
          type: integer
        days_since_purchase:
          type: integer
        within_refund_window:
          type: boolean
        requires_approval:
          type: boolean
        max_allowed_amount:
          type: number
        policy_checked_at:
          type: string
        namespace:
          type: string
        check_id:
          type: string
        policy_passed:
          type: boolean
        violations:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
        auto_approve:
          type: boolean
        requires_manager_approval:
          type: boolean
        approval_level:
          type: string
        applied_policy:
          type: object
        checked_at:
          type: string
    handler:
      callable: CustomerSuccess::StepHandlers::CheckRefundPolicyHandler
    dependencies:
      - validate_refund_request
    retry:
      retryable: true
      max_attempts: 2
      backoff: exponential
      initial_delay: 2
      max_delay: 20

  - name: get_manager_approval
    description: "Route to manager for approval if needed"
    result_schema:
      type: object
      required:
        - approval_obtained
        - approval_required
        - auto_approved
        - approval_id
        - approved_at
        - namespace
        - approved
        - reason
        - decision_type
        - decided_by
        - decided_at
      properties:
        approval_obtained:
          type: boolean
        approval_required:
          type: boolean
        auto_approved:
          type: boolean
        approval_id:
          type: string
        manager_id:
          type: string
        manager_notes:
          type: string
        approved_at:
          type: string
        namespace:
          type: string
        approved:
          type: boolean
        reason:
          type: string
        denial_reason:
          type: string
        approval_level:
          type: string
        decision_type:
          type: string
        decided_by:
          type: string
        manager:
          type: object
        requesting_agent:
          type: string
        priority:
          type: string
        conditions:
          type: array
          items:
            type: string
        decided_at:
          type: string
    handler:
      callable: CustomerSuccess::StepHandlers::GetManagerApprovalHandler
    dependencies:
      - check_refund_policy
    retry:
      retryable: true
      max_attempts: 1
      backoff: linear
      initial_delay: 60

  - name: execute_refund_workflow
    description: "Call payments team refund workflow"
    result_schema:
      type: object
      required:
        - task_delegated
        - target_namespace
        - target_workflow
        - delegated_task_id
        - delegated_task_status
        - delegation_timestamp
        - correlation_id
        - namespace
        - execution_id
        - executed
        - refund_transaction_id
        - amount_refunded
        - order_ref
        - customer_id
        - payment_method
        - steps_executed
        - total_steps
        - all_steps_completed
        - conditions_applied
        - executed_at
      properties:
        task_delegated:
          type: boolean
        target_namespace:
          type: string
        target_workflow:
          type: string
        delegated_task_id:
          type: string
        delegated_task_status:
          type: string
        delegation_timestamp:
          type: string
        correlation_id:
          type: string
        namespace:
          type: string
        execution_id:
          type: string
        executed:
          type: boolean
        refund_transaction_id:
          type: string
        amount_refunded:
          type: number
        order_ref:
          type: string
        customer_id:
          type: string
        payment_method:
          type: string
        steps_executed:
          type: array
        total_steps:
          type: integer
        all_steps_completed:
          type: boolean
        conditions_applied:
          type: array
          items:
            type: string
        executed_at:
          type: string
    handler:
      callable: CustomerSuccess::StepHandlers::ExecuteRefundWorkflowHandler
    dependencies:
      - get_manager_approval
    retry:
      retryable: true
      max_attempts: 3
      backoff: exponential
      initial_delay: 5
      max_delay: 60

  - name: update_ticket_status
    description: "Update customer support ticket"
    result_schema:
      type: object
      required:
        - ticket_updated
        - ticket_id
        - previous_status
        - new_status
        - resolution_note
        - updated_at
        - refund_completed
        - delegated_task_id
        - namespace
        - update_id
        - ticket_status
        - resolution_category
        - timeline
        - internal_notes
        - customer_facing_message
        - satisfaction_survey_scheduled
        - follow_up_required
      properties:
        ticket_updated:
          type: boolean
        ticket_id:
          type: string
        previous_status:
          type: string
        new_status:
          type: string
        resolution_note:
          type: string
        updated_at:
          type: string
        refund_completed:
          type: boolean
        delegated_task_id:
          type: string
        namespace:
          type: string
        update_id:
          type: string
        ticket_status:
          type: string
        resolution_category:
          type: string
        timeline:
          type: array
        internal_notes:
          type: string
        customer_facing_message:
          type: string
        satisfaction_survey_scheduled:
          type: boolean
        follow_up_required:
          type: boolean
    handler:
      callable: CustomerSuccess::StepHandlers::UpdateTicketStatusHandler
    dependencies:
      - execute_refund_workflow
    retry:
      retryable: true
      max_attempts: 3
      backoff: exponential
      initial_delay: 2
      max_delay: 30
