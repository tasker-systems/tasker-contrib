# TaskTemplate Configuration - Rails Example App
#
# Customer Success Namespace: Process Refund Workflow
# Demonstrates namespace isolation with same workflow name in different namespaces
#
# Template: customer_success/process_refund:1.3.0
# Implementation: Rails Example App
# Blog Post: Post 04 - Team Scaling (Namespace Isolation)
#
# Business Workflow Pattern (5 steps):
# 1. Validate Refund Request: Validate customer refund request details
# 2. Check Refund Policy: Verify request complies with refund policies
# 3. Get Manager Approval: Route to manager for approval if needed
# 4. Execute Refund Workflow: Call payments team refund workflow (cross-namespace)
# 5. Update Ticket Status: Update customer support ticket
#
# This demonstrates the customer success team's approval-based refund workflow
# with cross-namespace coordination to the payments team
#
---
name: process_refund
namespace_name: customer_success_rb
version: 1.0.0
description: "Process customer service refunds with approval workflow - Post 04 Team Scaling"
metadata:
  author: Customer Success Team
  blog_post: post_04
  tags:
    - namespace:customer_success
    - pattern:approval_workflow
    - dependencies:linear_with_approval
    - cross_namespace:payments
    - implementation:rails_example
task_handler:
  callable: CustomerSuccess::ProcessRefundHandler
  initialization:
    timeout_seconds: 90
    max_retries: 3
input_schema:
  type: object
  required:
    - ticket_id
    - customer_id
    - refund_amount
    - customer_email
  properties:
    ticket_id:
      type: string
      description: "Customer support ticket ID"
    customer_id:
      type: string
      description: "Customer identifier"
    refund_amount:
      type: number
      minimum: 0
      description: "Requested refund amount in cents"
    refund_reason:
      type: string
      description: "Customer's reason for refund"
    agent_notes:
      type: string
      description: "Internal agent notes"
    requires_approval:
      type: boolean
      default: true
      description: "Whether manager approval is required"
    customer_email:
      type: string
      description: "Customer email address for notifications"
    correlation_id:
      type: string
      description: "Correlation ID for tracking across systems"
    payment_id:
      type: string
      description: "Payment ID for cross-team workflow coordination"
steps:
  - name: validate_refund_request
    description: "Validate customer refund request details"
    result_schema:
      type: object
      required:
        - request_id
        - ticket_id
        - eligible
        - amount
        - validated_at
      properties:
        request_validated:
          type: boolean
        ticket_id:
          type: string
        customer_id:
          type: string
        ticket_status:
          type: string
        customer_tier:
          type: string
        original_purchase_date:
          type: string
        payment_id:
          type: string
        validation_timestamp:
          type: string
        namespace:
          type: string
        request_id:
          type: string
        order_ref:
          type: string
        amount:
          type: number
        reason:
          type: string
        customer_email:
          type: string
        validation_hash:
          type: string
        eligible:
          type: boolean
        validated_at:
          type: string
    handler:
      callable: CustomerSuccess::StepHandlers::ValidateRefundRequestHandler
    dependencies: []
    retry:
      retryable: true
      max_attempts: 3
      backoff: exponential
      initial_delay: 2
      max_delay: 30

  - name: check_refund_policy
    description: "Verify request complies with refund policies"
    result_schema:
      type: object
      required:
        - request_id
        - policy_compliant
        - requires_approval
        - policy_id
        - checked_at
      properties:
        policy_checked:
          type: boolean
        policy_compliant:
          type: boolean
        customer_tier:
          type: string
        refund_window_days:
          type: integer
        days_since_purchase:
          type: integer
        within_refund_window:
          type: boolean
        requires_approval:
          type: boolean
        max_allowed_amount:
          type: number
        policy_checked_at:
          type: string
        namespace:
          type: string
        policy_id:
          type: string
        request_id:
          type: string
        approval_path:
          type: string
          enum:
            - auto
            - manager
            - director
        requires_review:
          type: boolean
        amount_tier:
          type: string
        policy_version:
          type: string
        rules_applied:
          type: array
          items:
            type: string
        checked_at:
          type: string
    handler:
      callable: CustomerSuccess::StepHandlers::CheckRefundPolicyHandler
    dependencies:
      - validate_refund_request
    retry:
      retryable: true
      max_attempts: 2
      backoff: exponential
      initial_delay: 2
      max_delay: 20

  - name: get_manager_approval
    description: "Route to manager for approval if needed"
    result_schema:
      type: object
      required:
        - request_id
        - approved
        - approved_at
      properties:
        approval_obtained:
          type: boolean
        approval_required:
          type: boolean
        auto_approved:
          type: boolean
        approval_id:
          type: string
        manager_id:
          type: string
        manager_notes:
          type: string
        approved_at:
          type: string
        namespace:
          type: string
        request_id:
          type: string
        approved:
          type: boolean
        approver:
          type: string
        approval_path:
          type: string
        approval_note:
          type: string
        amount_approved:
          type: number
    handler:
      callable: CustomerSuccess::StepHandlers::GetManagerApprovalHandler
    dependencies:
      - check_refund_policy
    retry:
      retryable: true
      max_attempts: 1
      backoff: linear
      initial_delay: 60

  - name: execute_refund_workflow
    description: "Call payments team refund workflow"
    result_schema:
      type: object
      required:
        - request_id
        - refund_id
        - status
        - amount_refunded
        - executed_at
      properties:
        task_delegated:
          type: boolean
        target_namespace:
          type: string
        target_workflow:
          type: string
        delegated_task_id:
          type: string
        delegated_task_status:
          type: string
        delegation_timestamp:
          type: string
        correlation_id:
          type: string
        namespace:
          type: string
        refund_id:
          type: string
        transaction_ref:
          type: string
        request_id:
          type: string
        order_ref:
          type: string
        amount_refunded:
          type: number
        currency:
          type: string
        refund_method:
          type: string
        estimated_arrival:
          type: string
        status:
          type: string
          enum:
            - completed
            - processing
        executed_at:
          type: string
    handler:
      callable: CustomerSuccess::StepHandlers::ExecuteRefundWorkflowHandler
    dependencies:
      - get_manager_approval
    retry:
      retryable: true
      max_attempts: 3
      backoff: exponential
      initial_delay: 5
      max_delay: 60

  - name: update_ticket_status
    description: "Update customer support ticket"
    result_schema:
      type: object
      required:
        - ticket_id
        - request_id
        - ticket_updated
        - new_status
        - resolved_at
      properties:
        ticket_updated:
          type: boolean
        ticket_id:
          type: string
        previous_status:
          type: string
        new_status:
          type: string
        resolution_note:
          type: string
        updated_at:
          type: string
        refund_completed:
          type: boolean
        delegated_task_id:
          type: string
        namespace:
          type: string
        request_id:
          type: string
        resolution:
          type: string
        customer_notified:
          type: boolean
        notification_channel:
          type: string
        refund_id:
          type: string
        amount_refunded:
          type: number
        ticket_status:
          type: string
        resolved_at:
          type: string
    handler:
      callable: CustomerSuccess::StepHandlers::UpdateTicketStatusHandler
    dependencies:
      - execute_refund_workflow
    retry:
      retryable: true
      max_attempts: 3
      backoff: exponential
      initial_delay: 2
      max_delay: 30
