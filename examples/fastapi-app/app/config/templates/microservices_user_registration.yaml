# TaskTemplate Configuration - FastAPI Example Application
#
# Microservices Namespace: User Registration Workflow
# Demonstrates microservices coordination with parallel execution
#
# Template: microservices/user_registration:1.0.0
# Implementation: FastAPI Example Application
#
# Business Workflow Pattern (5 steps):
# Microservices Coordination - Sequential + Parallel Execution
#
# Sequential Phase (1 step):
# 1. Create User Account: Create user in user service (with idempotency)
#
# Parallel Phase (2 steps):
# 2. Setup Billing Profile: Create billing profile in billing service
# 3. Initialize Preferences: Set user preferences in preferences service
#
# Coordination Phase (1 step):
# 4. Send Welcome Sequence: Send welcome emails via notification service (depends on billing + preferences)
#
# Completion Phase (1 step):
# 5. Update User Status: Mark user as active in user service (final step)
#
# This demonstrates parallel execution, dependency resolution, and multi-service coordination
# using Tasker's built-in retry system as a circuit breaker pattern.
#
---
name: user_registration
namespace_name: microservices_py
version: 1.0.0
description: "User registration workflow with microservices coordination - Microservices"
metadata:
  author: FastAPI Example Application
  tags:
    - namespace:microservices
    - pattern:parallel_execution
    - pattern:circuit_breaker
    - dependencies:multi_service
    - implementation:fastapi_example
    - language:python
    - business_logic:user_registration
  documentation_url:
  created_at: "2026-01-12T00:00:00Z"
  updated_at: "2026-01-12T00:00:00Z"
  notes: "FastAPI example application demonstrating microservices coordination"
task_handler:
  callable: Microservices.TaskHandlers.UserRegistrationHandler
  initialization:
    timeout_seconds: 120
    max_retries: 2
system_dependencies:
  primary: default
  secondary: []
domain_events: []
input_schema:
  type: object
  properties:
    email:
      type: string
      format: email
    full_name:
      type: string
    plan:
      type: string
      enum: [starter, professional, enterprise]
    phone:
      type: string
    source:
      type: string
  required:
    - email
    - full_name
steps:
  # SEQUENTIAL PHASE - User creation must complete first
  - name: create_user_account
    description: "Create user account in user service with idempotency"
    result_schema:
      type: object
      required:
        - user_id
        - email
        - status
        - created_at
      properties:
        user_id:
          type: string
        email:
          type: string
        name:
          type: string
        plan:
          type: string
        phone:
          type: string
        source:
          type: string
        status:
          type: string
        internal_id:
          type: string
        username:
          type: string
        full_name:
          type: string
        referral_code:
          type: string
        verification_token:
          type: string
        email_verified:
          type: boolean
        account_status:
          type: string
        created_at:
          type: string
    handler:
      callable: create_user_account
      initialization:
        scenario: user_registration
    system_dependency:
    dependencies: []
    retry:
      retryable: true
      max_attempts: 3
      backoff: exponential
      backoff_base_ms: 2000
      max_backoff_ms: 30000
    timeout_seconds: 30
    publishes_events: []

  # PARALLEL PHASE - Billing and preferences run concurrently after user creation
  - name: setup_billing_profile
    description: "Setup billing profile in billing service"
    result_schema:
      type: object
      required:
        - billing_id
        - user_id
        - plan
        - status
        - created_at
      properties:
        billing_id:
          type: string
        user_id:
          type: string
        plan:
          type: string
          enum:
            - free
            - pro
            - enterprise
        price:
          type: number
        currency:
          type: string
        billing_cycle:
          type: string
        features:
          type: array
          items:
            type: string
        status:
          type: string
        billing_required:
          type: boolean
        next_billing_date:
          type: string
        subscription_id:
          type: string
        user_internal_id:
          type: string
        pricing:
          type: object
        limits:
          type: object
        billing_status:
          type: string
        trial_end:
          type: string
        payment_method_required:
          type: boolean
        created_at:
          type: string
    handler:
      callable: setup_billing_profile
      initialization:
        scenario: user_registration
    system_dependency:
    dependencies:
      - create_user_account
    retry:
      retryable: true
      max_attempts: 3
      backoff: exponential
      backoff_base_ms: 2000
      max_backoff_ms: 30000
    timeout_seconds: 30
    publishes_events: []

  - name: initialize_preferences
    description: "Initialize user preferences in preferences service"
    result_schema:
      type: object
      required:
        - preferences_id
        - user_id
        - status
        - created_at
      properties:
        preferences_id:
          type: string
        user_id:
          type: string
        plan:
          type: string
        preferences:
          type: object
        defaults_applied:
          type: integer
        customizations:
          type: integer
        status:
          type: string
        user_internal_id:
          type: string
        notifications:
          type: object
        ui_settings:
          type: object
        feature_flags:
          type: object
        onboarding_completed:
          type: boolean
        created_at:
          type: string
        updated_at:
          type: string
    handler:
      callable: initialize_preferences
      initialization:
        scenario: user_registration
    system_dependency:
    dependencies:
      - create_user_account
    retry:
      retryable: true
      max_attempts: 3
      backoff: exponential
      backoff_base_ms: 2000
      max_backoff_ms: 30000
    timeout_seconds: 30
    publishes_events: []

  # COORDINATION PHASE - Welcome sequence waits for both billing and preferences
  - name: send_welcome_sequence
    description: "Send welcome emails via notification service"
    result_schema:
      type: object
      required:
        - sequence_id
        - user_id
        - messages_sent
        - status
        - sent_at
      properties:
        user_id:
          type: string
        plan:
          type: string
        channels_used:
          type: array
          items:
            type: string
        messages_sent:
          type: integer
        welcome_sequence_id:
          type: string
        status:
          type: string
        messages_sent_details:
          type: array
          items:
            type: object
            required:
              - channel
              - template
              - status
            properties:
              channel:
                type: string
              template:
                type: string
              status:
                type: string
        total_messages:
          type: integer
        sequence_id:
          type: string
        sent_at:
          type: string
    handler:
      callable: send_welcome_sequence
      initialization:
        scenario: user_registration
    system_dependency:
    dependencies:
      - setup_billing_profile
      - initialize_preferences
    retry:
      retryable: true
      max_attempts: 2
      backoff: exponential
      backoff_base_ms: 2000
      max_backoff_ms: 20000
    timeout_seconds: 20
    publishes_events: []

  # COMPLETION PHASE - Final status update after welcome sequence
  - name: update_user_status
    description: "Update user status to active in user service"
    result_schema:
      type: object
      required:
        - user_id
        - status
        - registration_complete
        - activated_at
      properties:
        user_id:
          type: string
        status:
          type: string
        plan:
          type: string
        registration_summary:
          type: object
        activation_timestamp:
          type: string
        all_services_coordinated:
          type: boolean
        services_completed:
          type: array
          items:
            type: string
        internal_id:
          type: string
        email:
          type: string
        account_status:
          type: string
        billing_id:
          type: string
        subscription_id:
          type: string
        onboarding_status:
          type: string
        welcome_messages_sent:
          type: integer
        registration_complete:
          type: boolean
        activated_at:
          type: string
    handler:
      callable: update_user_status
      initialization:
        scenario: user_registration
    system_dependency:
    dependencies:
      - send_welcome_sequence
    retry:
      retryable: true
      max_attempts: 2
      backoff: exponential
      backoff_base_ms: 2000
      max_backoff_ms: 20000
    timeout_seconds: 20
    publishes_events: []

environments:
  test:
    steps:
      - name: create_user_account
        timeout_seconds: 30
      - name: setup_billing_profile
        timeout_seconds: 30
      - name: initialize_preferences
        timeout_seconds: 30
      - name: send_welcome_sequence
        timeout_seconds: 20
      - name: update_user_status
        timeout_seconds: 20
