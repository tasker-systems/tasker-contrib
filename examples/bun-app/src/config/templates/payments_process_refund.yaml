# TaskTemplate Configuration - Bun/Hono Example App
#
# Payments Namespace: Process Refund Workflow
# Demonstrates namespace isolation with same workflow name in different namespaces
#
# Template: payments/process_refund:1.0.0
# Implementation: Bun/Hono with @tasker-systems/tasker
#
# Business Workflow Pattern (4 steps):
# 1. Validate Payment Eligibility: Check if payment can be refunded via gateway
# 2. Process Gateway Refund: Execute refund through payment processor
# 3. Update Payment Records: Update internal payment status and history
# 4. Notify Customer: Send refund confirmation to customer
#
# This demonstrates the payments team's direct refund workflow
#
---
name: process_refund
namespace_name: payments_ts
version: 1.0.0
description: "Process payment gateway refunds with direct API integration - Post 04 Team Scaling"
metadata:
  author: Bun/Hono Example App
  tags:
    - namespace:payments
    - pattern:refund_processing
    - dependencies:linear
    - implementation:bun_hono
    - language:typescript
    - blog_post:post_04
  documentation_url:
  created_at: "2026-01-12T00:00:00Z"
  updated_at: "2026-01-12T00:00:00Z"
  notes: "Bun/Hono example app demonstrating namespace isolation from Blog Post 04"
task_handler:
  callable: Payments.TaskHandlers.ProcessRefundHandler
  initialization:
    timeout_seconds: 60
    max_retries: 3
input_schema:
  type: object
  required:
    - payment_id
    - refund_amount
  properties:
    payment_id:
      type: string
      description: "Payment gateway transaction ID"
      pattern: "^pay_[a-zA-Z0-9_]+$"
    refund_amount:
      type: number
      minimum: 0
      description: "Amount to refund in cents"
    refund_reason:
      type: string
      enum:
        - customer_request
        - fraud
        - system_error
        - chargeback
      description: "Reason for the refund"
    partial_refund:
      type: boolean
      default: false
      description: "Whether this is a partial refund"
    customer_email:
      type: string
      description: "Customer email address for notification"
    correlation_id:
      type: string
      description: "Correlation ID for tracking across systems"
steps:
  - name: validate_payment_eligibility
    description: "Check if payment can be refunded via gateway"
    result_schema:
      type: object
      required:
        - payment_validated
        - payment_id
        - original_amount
        - refund_amount
        - payment_method
        - gateway_provider
        - eligibility_status
        - validation_timestamp
        - namespace
      properties:
        payment_validated:
          type: boolean
        payment_id:
          type: string
        original_amount:
          type: number
        refund_amount:
          type: number
        payment_method:
          type: string
        gateway_provider:
          type: string
        eligibility_status:
          type: string
        validation_timestamp:
          type: string
        namespace:
          type: string
    handler:
      callable: Payments.StepHandlers.ProcessRefundPaymentHandler
      initialization:
        scenario: payments_refund
    dependencies: []
    retry:
      retryable: true
      max_attempts: 3
      backoff: exponential
      backoff_base_ms: 2000
      max_backoff_ms: 30000
    timeout_seconds: 10

  - name: process_gateway_refund
    description: "Execute refund through payment processor"
    result_schema:
      type: object
      required:
        - refund_processed
        - refund_id
        - payment_id
        - refund_amount
        - refund_status
        - gateway_transaction_id
        - gateway_provider
        - processed_at
        - estimated_arrival
        - namespace
      properties:
        refund_processed:
          type: boolean
        refund_id:
          type: string
        payment_id:
          type: string
        refund_amount:
          type: number
        refund_status:
          type: string
        gateway_transaction_id:
          type: string
        gateway_provider:
          type: string
        processed_at:
          type: string
        estimated_arrival:
          type: string
        namespace:
          type: string
    handler:
      callable: Payments.StepHandlers.UpdateLedgerHandler
      initialization:
        scenario: payments_refund
    dependencies:
      - validate_payment_eligibility
    retry:
      retryable: true
      max_attempts: 2
      backoff: exponential
      backoff_base_ms: 5000
      max_backoff_ms: 60000
    timeout_seconds: 10

  - name: update_payment_records
    description: "Update internal payment status and history"
    result_schema:
      type: object
      required:
        - records_updated
        - payment_id
        - refund_id
        - record_id
        - payment_status
        - refund_status
        - history_entries_created
        - updated_at
        - namespace
      properties:
        records_updated:
          type: boolean
        payment_id:
          type: string
        refund_id:
          type: string
        record_id:
          type: string
        payment_status:
          type: string
        refund_status:
          type: string
        history_entries_created:
          type: integer
        updated_at:
          type: string
        namespace:
          type: string
    handler:
      callable: Payments.StepHandlers.ReconcileAccountHandler
      initialization:
        scenario: payments_refund
    dependencies:
      - process_gateway_refund
    retry:
      retryable: true
      max_attempts: 3
      backoff: exponential
      backoff_base_ms: 2000
      max_backoff_ms: 30000
    timeout_seconds: 10

  - name: notify_customer
    description: "Send refund confirmation to customer"
    result_schema:
      type: object
      required:
        - notification_sent
        - customer_email
        - message_id
        - notification_type
        - sent_at
        - delivery_status
        - refund_id
        - refund_amount
        - namespace
      properties:
        notification_sent:
          type: boolean
        customer_email:
          type: string
        message_id:
          type: string
        notification_type:
          type: string
        sent_at:
          type: string
        delivery_status:
          type: string
        refund_id:
          type: string
        refund_amount:
          type: number
        namespace:
          type: string
    handler:
      callable: Payments.StepHandlers.GenerateRefundReceiptHandler
      initialization:
        scenario: payments_refund
    dependencies:
      - update_payment_records
    retry:
      retryable: true
      max_attempts: 5
      backoff: exponential
      backoff_base_ms: 2000
      max_backoff_ms: 60000
    timeout_seconds: 10

environments:
  test:
    steps:
      - name: validate_payment_eligibility
        timeout_seconds: 10
      - name: process_gateway_refund
        timeout_seconds: 10
      - name: update_payment_records
        timeout_seconds: 10
      - name: notify_customer
        timeout_seconds: 10
