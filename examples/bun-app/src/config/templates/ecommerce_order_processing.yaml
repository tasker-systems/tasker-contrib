# TaskTemplate Configuration - Bun/Hono Example App
#
# E-commerce Order Processing Workflow Pattern with TypeScript Step Handlers
# Demonstrates complete order checkout workflow with cart validation, payment, inventory, and confirmation
#
# Template: ecommerce/order_processing:1.0.0
# Implementation: Bun/Hono with @tasker-systems/tasker
#
# Business Workflow Pattern (5 steps):
# 1. Validate Cart: Validate cart items, check availability, calculate totals
# 2. Process Payment: Process customer payment using payment service
# 3. Update Inventory: Reserve inventory for order items
# 4. Create Order: Create order record with all details
# 5. Send Confirmation: Send order confirmation email to customer
#
# This demonstrates real-world e-commerce checkout workflow with external service integration
#
---
name: ecommerce_order_processing
namespace_name: ecommerce_ts
version: 1.0.0
description: "Complete e-commerce order processing: validate -> payment -> inventory -> order -> confirmation"
metadata:
  author: Bun/Hono Example App
  tags:
    - namespace:ecommerce
    - pattern:order_processing
    - dependencies:linear_with_validation
    - implementation:bun_hono
    - language:typescript
    - type_safety:compile_time
    - business_logic:ecommerce_checkout
    - external_services:simulated
    - blog_post:post_01
  documentation_url:
  created_at: "2026-01-12T00:00:00Z"
  updated_at: "2026-01-12T00:00:00Z"
  notes: "Bun/Hono example app demonstrating e-commerce checkout workflow from Blog Post 01"
task_handler:
  callable: Ecommerce.TaskHandlers.OrderProcessingHandler
  initialization:
    input_validation:
      required_fields:
        - cart_items
        - customer_info
        - payment_info
      business_rules:
        - cart_validation: required
        - payment_processing: external_gateway
        - inventory_management: check_and_reserve
        - order_creation: transaction_safe
        - email_notification: async_delivery
    expected_results:
      validate_cart: "validated cart with totals"
      process_payment: "payment confirmation"
      update_inventory: "inventory reservations"
      create_order: "order created"
      send_confirmation: "email sent"
system_dependencies:
  primary: default
  secondary: []
domain_events: []
input_schema:
  type: object
  required:
    - cart_items
    - customer_email
  properties:
    cart_items:
      type: array
      description: "Array of cart items with sku, name, price, and quantity"
      items:
        type: object
        required:
          - sku
          - name
          - price
          - quantity
        properties:
          sku:
            type: string
            description: "Product SKU"
          name:
            type: string
            description: "Product name"
          price:
            type: number
            description: "Unit price"
          quantity:
            type: integer
            description: "Quantity to purchase"
    customer_email:
      type: string
      description: "Customer email address"
    payment_info:
      type: object
      description: "Payment information"
      properties:
        method:
          type: string
          description: "Payment method (credit_card, paypal, etc.)"
        card_last_four:
          type: string
          description: "Last four digits of card"
steps:
  - name: validate_cart
    description: "Validate cart items, check availability, calculate totals (subtotal, tax, shipping)"
    result_schema:
      type: object
      required:
        - validated_items
        - item_count
        - subtotal
        - tax
        - tax_rate
        - shipping
        - total
        - free_shipping
        - validation_warnings
      properties:
        validated_items:
          type: array
          items:
            type: object
            required:
              - sku
              - name
              - price
              - quantity
            properties:
              sku:
                type: string
              name:
                type: string
              price:
                type: number
              quantity:
                type: integer
        item_count:
          type: integer
        subtotal:
          type: number
        tax:
          type: number
        tax_rate:
          type: number
        shipping:
          type: number
        total:
          type: number
        free_shipping:
          type: boolean
        validation_warnings:
          type: array
          items:
            type: string
    handler:
      callable: Ecommerce.StepHandlers.ValidateCartHandler
      initialization:
        scenario: ecommerce_checkout
    system_dependency:
    dependencies: []
    retry:
      retryable: true
      max_attempts: 2
      backoff: exponential
      backoff_base_ms: 100
      max_backoff_ms: 5000
    timeout_seconds: 10
    publishes_events: []

  - name: process_payment
    description: "Process customer payment using mock payment service"
    result_schema:
      type: object
      required:
        - payment_id
        - transaction_id
        - status
        - amount_charged
        - currency
        - payment_method
        - auth_code
        - processing_fee
        - net_amount
        - card_last_four
        - gateway
        - authorized_at
      properties:
        payment_id:
          type: string
        transaction_id:
          type: string
        status:
          type: string
          enum:
            - succeeded
        amount_charged:
          type: number
        currency:
          type: string
          enum:
            - USD
        payment_method:
          type: string
        auth_code:
          type: string
        processing_fee:
          type: number
        net_amount:
          type: number
        card_last_four:
          type: string
        gateway:
          type: string
        authorized_at:
          type: string
    handler:
      callable: Ecommerce.StepHandlers.ProcessPaymentHandler
      initialization:
        scenario: ecommerce_checkout
    system_dependency:
    dependencies:
      - validate_cart
    retry:
      retryable: true
      max_attempts: 2
      backoff: exponential
      backoff_base_ms: 100
      max_backoff_ms: 5000
    timeout_seconds: 10
    publishes_events: []

  - name: update_inventory
    description: "Reserve inventory for order items using mock inventory service"
    result_schema:
      type: object
      required:
        - updated_products
        - total_items_reserved
        - inventory_log_id
        - updated_at
        - reservation_expires_at
        - all_items_available
      properties:
        updated_products:
          type: array
          items:
            type: object
            required:
              - sku
              - name
              - previous_stock
              - new_stock
              - quantity_reserved
              - reservation_id
              - warehouse
            properties:
              sku:
                type: string
              name:
                type: string
              previous_stock:
                type: integer
              new_stock:
                type: integer
              quantity_reserved:
                type: integer
              reservation_id:
                type: string
              warehouse:
                type: string
        total_items_reserved:
          type: integer
        inventory_log_id:
          type: string
        updated_at:
          type: string
        reservation_expires_at:
          type: string
        all_items_available:
          type: boolean
    handler:
      callable: Ecommerce.StepHandlers.UpdateInventoryHandler
      initialization:
        scenario: ecommerce_checkout
    system_dependency:
    dependencies:
      - process_payment
    retry:
      retryable: true
      max_attempts: 2
      backoff: exponential
      backoff_base_ms: 100
      max_backoff_ms: 5000
    timeout_seconds: 10
    publishes_events: []

  - name: create_order
    description: "Create order record with customer, payment, and inventory details"
    result_schema:
      type: object
      required:
        - order_id
        - order_number
        - status
        - total_amount
        - customer_email
        - created_at
        - estimated_delivery
        - items
        - subtotal
        - tax
        - shipping
        - transaction_id
        - inventory_reservations
      properties:
        order_id:
          type: integer
        order_number:
          type: string
        status:
          type: string
          enum:
            - confirmed
        total_amount:
          type: number
        customer_email:
          type: string
        created_at:
          type: string
        estimated_delivery:
          type: string
        items:
          type: array
          items:
            type: object
            required:
              - sku
              - name
              - price
              - quantity
            properties:
              sku:
                type: string
              name:
                type: string
              price:
                type: number
              quantity:
                type: integer
        subtotal:
          type: number
        tax:
          type: number
        shipping:
          type: number
        transaction_id:
          type: string
        inventory_reservations:
          type: integer
    handler:
      callable: Ecommerce.StepHandlers.CreateOrderHandler
      initialization:
        scenario: ecommerce_checkout
    system_dependency:
    dependencies:
      - update_inventory
    retry:
      retryable: true
      max_attempts: 2
      backoff: exponential
      backoff_base_ms: 100
      max_backoff_ms: 5000
    timeout_seconds: 10
    publishes_events: []

  - name: send_confirmation
    description: "Send order confirmation email to customer using mock email service"
    result_schema:
      type: object
      required:
        - email_id
        - recipient
        - subject
        - status
        - sent_at
        - template
        - template_data
        - provider
      properties:
        email_id:
          type: string
        recipient:
          type: string
        subject:
          type: string
        status:
          type: string
          enum:
            - sent
        sent_at:
          type: string
        template:
          type: string
        template_data:
          type: object
          required:
            - customer_name
            - order_number
            - total_amount
            - estimated_delivery
            - items
          properties:
            customer_name:
              type: string
            order_number:
              type: string
            total_amount:
              type: number
            estimated_delivery:
              type: string
            items:
              type: array
              items:
                type: object
                required:
                  - sku
                  - name
                  - price
                  - quantity
                properties:
                  sku:
                    type: string
                  name:
                    type: string
                  price:
                    type: number
                  quantity:
                    type: integer
        provider:
          type: string
    handler:
      callable: Ecommerce.StepHandlers.SendConfirmationHandler
      initialization:
        scenario: ecommerce_checkout
    system_dependency:
    dependencies:
      - create_order
    retry:
      retryable: true
      max_attempts: 2
      backoff: exponential
      backoff_base_ms: 100
      max_backoff_ms: 5000
    timeout_seconds: 10
    publishes_events: []

environments:
  test:
    steps:
      - name: validate_cart
        timeout_seconds: 10
      - name: process_payment
        timeout_seconds: 10
      - name: update_inventory
        timeout_seconds: 10
      - name: create_order
        timeout_seconds: 10
      - name: send_confirmation
        timeout_seconds: 10
