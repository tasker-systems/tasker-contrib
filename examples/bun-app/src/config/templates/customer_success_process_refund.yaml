# TaskTemplate Configuration - Bun/Hono Example App
#
# Customer Success Namespace: Process Refund Workflow
# Demonstrates namespace isolation with same workflow name in different namespaces
#
# Template: customer_success/process_refund:1.0.0
# Implementation: Bun/Hono with @tasker-systems/tasker
#
# Business Workflow Pattern (5 steps):
# 1. Validate Refund Request: Validate customer refund request details
# 2. Check Refund Policy: Verify request complies with refund policies
# 3. Get Manager Approval: Route to manager for approval if needed
# 4. Execute Refund Workflow: Call payments team refund workflow (cross-namespace)
# 5. Update Ticket Status: Update customer support ticket
#
# This demonstrates the customer success team's approval-based refund workflow
# with cross-namespace coordination to the payments team
#
---
name: process_refund
namespace_name: customer_success_ts
version: 1.0.0
description: "Process customer service refunds with approval workflow - Post 04 Team Scaling"
metadata:
  author: Bun/Hono Example App
  tags:
    - namespace:customer_success
    - pattern:approval_workflow
    - dependencies:linear_with_approval
    - cross_namespace:payments
    - implementation:bun_hono
    - language:typescript
    - blog_post:post_04
  documentation_url:
  created_at: "2026-01-12T00:00:00Z"
  updated_at: "2026-01-12T00:00:00Z"
  notes: "Bun/Hono example app demonstrating namespace isolation from Blog Post 04"
task_handler:
  callable: CustomerSuccess.TaskHandlers.ProcessRefundHandler
  initialization:
    timeout_seconds: 90
    max_retries: 3
input_schema:
  type: object
  required:
    - ticket_id
    - customer_id
    - refund_amount
    - customer_email
  properties:
    ticket_id:
      type: string
      description: "Customer support ticket ID"
    customer_id:
      type: string
      description: "Customer identifier"
    refund_amount:
      type: number
      minimum: 0
      description: "Requested refund amount in cents"
    refund_reason:
      type: string
      description: "Customer's reason for refund"
    agent_notes:
      type: string
      description: "Internal agent notes"
    requires_approval:
      type: boolean
      default: true
      description: "Whether manager approval is required"
    customer_email:
      type: string
      description: "Customer email address for notifications"
    correlation_id:
      type: string
      description: "Correlation ID for tracking across systems"
    payment_id:
      type: string
      description: "Payment ID for cross-team workflow coordination"
steps:
  - name: validate_refund_request
    description: "Validate customer refund request details"
    result_schema:
      type: object
      required:
        - request_validated
        - ticket_id
        - customer_id
        - ticket_status
        - customer_tier
        - original_purchase_date
        - payment_id
        - validation_timestamp
        - namespace
      properties:
        request_validated:
          type: boolean
        ticket_id:
          type: string
        customer_id:
          type: string
        ticket_status:
          type: string
        customer_tier:
          type: string
        original_purchase_date:
          type: string
        payment_id:
          type: string
        validation_timestamp:
          type: string
        namespace:
          type: string
    handler:
      callable: CustomerSuccess.StepHandlers.ValidateRefundRequestHandler
      initialization:
        scenario: customer_success_refund
    dependencies: []
    retry:
      retryable: true
      max_attempts: 3
      backoff: exponential
      backoff_base_ms: 2000
      max_backoff_ms: 30000
    timeout_seconds: 10

  - name: check_refund_policy
    description: "Verify request complies with refund policies"
    result_schema:
      type: object
      required:
        - policy_checked
        - policy_compliant
        - customer_tier
        - refund_window_days
        - days_since_purchase
        - within_refund_window
        - requires_approval
        - max_allowed_amount
        - policy_checked_at
        - namespace
      properties:
        policy_checked:
          type: boolean
        policy_compliant:
          type: boolean
        customer_tier:
          type: string
        refund_window_days:
          type: integer
        days_since_purchase:
          type: integer
        within_refund_window:
          type: boolean
        requires_approval:
          type: boolean
        max_allowed_amount:
          type: number
        policy_checked_at:
          type: string
        namespace:
          type: string
    handler:
      callable: CustomerSuccess.StepHandlers.CheckRefundEligibilityHandler
      initialization:
        scenario: customer_success_refund
    dependencies:
      - validate_refund_request
    retry:
      retryable: true
      max_attempts: 2
      backoff: exponential
      backoff_base_ms: 2000
      max_backoff_ms: 20000
    timeout_seconds: 10

  - name: get_manager_approval
    description: "Route to manager for approval if needed"
    result_schema:
      type: object
      required:
        - approval_obtained
        - approval_required
        - auto_approved
        - manager_notes
        - approved_at
        - namespace
      properties:
        approval_obtained:
          type: boolean
        approval_required:
          type: boolean
        auto_approved:
          type: boolean
        approval_id:
          type:
            - string
            - "null"
        manager_id:
          type:
            - string
            - "null"
        manager_notes:
          type: string
        approved_at:
          type: string
        namespace:
          type: string
    handler:
      callable: CustomerSuccess.StepHandlers.CalculateRefundAmountHandler
      initialization:
        scenario: customer_success_refund
    dependencies:
      - check_refund_policy
    retry:
      retryable: true
      max_attempts: 1
      backoff: linear
      backoff_base_ms: 60000
      max_backoff_ms: 60000
    timeout_seconds: 10

  - name: execute_refund_workflow
    description: "Call payments team refund workflow"
    result_schema:
      type: object
      required:
        - task_delegated
        - target_namespace
        - target_workflow
        - delegated_task_id
        - delegated_task_status
        - delegation_timestamp
        - correlation_id
        - namespace
      properties:
        task_delegated:
          type: boolean
        target_namespace:
          type: string
        target_workflow:
          type: string
        delegated_task_id:
          type: string
        delegated_task_status:
          type: string
        delegation_timestamp:
          type: string
        correlation_id:
          type: string
        namespace:
          type: string
    handler:
      callable: CustomerSuccess.StepHandlers.NotifyCustomerSuccessHandler
      initialization:
        scenario: customer_success_refund
    dependencies:
      - get_manager_approval
    retry:
      retryable: true
      max_attempts: 3
      backoff: exponential
      backoff_base_ms: 5000
      max_backoff_ms: 60000
    timeout_seconds: 10

  - name: update_ticket_status
    description: "Update customer support ticket"
    result_schema:
      type: object
      required:
        - ticket_updated
        - ticket_id
        - previous_status
        - new_status
        - resolution_note
        - updated_at
        - refund_completed
        - delegated_task_id
        - namespace
      properties:
        ticket_updated:
          type: boolean
        ticket_id:
          type: string
        previous_status:
          type: string
        new_status:
          type: string
        resolution_note:
          type: string
        updated_at:
          type: string
        refund_completed:
          type: boolean
        delegated_task_id:
          type: string
        namespace:
          type: string
    handler:
      callable: CustomerSuccess.StepHandlers.UpdateCrmRecordHandler
      initialization:
        scenario: customer_success_refund
    dependencies:
      - execute_refund_workflow
    retry:
      retryable: true
      max_attempts: 3
      backoff: exponential
      backoff_base_ms: 2000
      max_backoff_ms: 30000
    timeout_seconds: 10

environments:
  test:
    steps:
      - name: validate_refund_request
        timeout_seconds: 10
      - name: check_refund_policy
        timeout_seconds: 10
      - name: get_manager_approval
        timeout_seconds: 10
      - name: execute_refund_workflow
        timeout_seconds: 10
      - name: update_ticket_status
        timeout_seconds: 10
