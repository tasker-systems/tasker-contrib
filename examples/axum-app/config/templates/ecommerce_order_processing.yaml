# TaskTemplate Configuration - Axum Example Application
#
# E-commerce Order Processing Workflow Pattern
# Demonstrates complete order checkout workflow with cart validation, payment, inventory, and confirmation
#
# Template: ecommerce/order_processing:1.0.0
# Implementation: Axum Example Application
#
# Business Workflow Pattern (5 steps):
# 1. Validate Cart: Validate cart items, check availability, calculate totals
# 2. Process Payment: Process customer payment using payment service
# 3. Update Inventory: Reserve inventory for order items
# 4. Create Order: Create order record with all details
# 5. Send Confirmation: Send order confirmation email to customer
#
# This demonstrates real-world e-commerce checkout workflow with external service integration
#
---
name: ecommerce_order_processing
namespace_name: ecommerce_rs
version: 1.0.0
description: "Complete e-commerce order processing: validate -> payment -> inventory -> order -> confirmation"
metadata:
  author: Axum Example Application
  tags:
    - namespace:ecommerce
    - pattern:order_processing
    - dependencies:linear_with_validation
    - implementation:axum_example
    - language:rust
    - type_safety:compile_time
    - business_logic:ecommerce_checkout
    - external_services:simulated
  documentation_url:
  created_at: "2026-01-12T00:00:00Z"
  updated_at: "2026-01-12T00:00:00Z"
  notes: "Axum example application demonstrating e-commerce checkout workflow"
system_dependencies:
  primary: default
  secondary: []
domain_events: []
input_schema:
  type: object
  required:
    - cart_items
    - customer_email
    - payment_token
  properties:
    cart_items:
      type: array
      description: "Array of cart items with product_id and quantity"
      items:
        type: object
        required:
          - product_id
          - quantity
        properties:
          product_id:
            type: integer
            description: "Product ID"
          quantity:
            type: integer
            description: "Quantity to purchase"
    customer_email:
      type: string
      description: "Customer email address"
    customer_name:
      type: string
      description: "Customer full name"
    payment_method:
      type: string
      description: "Payment method (credit_card, paypal, etc.)"
    payment_token:
      type: string
      description: "Payment token from payment gateway"
    payment_amount:
      type: number
      description: "Payment amount"
steps:
  - name: validate_cart
    description: "Validate cart items, check availability, calculate totals (subtotal, tax, shipping)"
    result_schema:
      type: object
      required:
        - item_count
        - subtotal
        - tax_rate
        - tax
        - shipping
        - total
        - validated_at
        - validated_items
      properties:
        validated_items:
          type: array
          items:
            type: object
            required:
              - sku
              - name
              - quantity
              - unit_price
              - line_total
            properties:
              sku:
                type: string
              name:
                type: string
              quantity:
                type: integer
              unit_price:
                type: number
              line_total:
                type: number
        item_count:
          type: integer
        subtotal:
          type: number
        tax:
          type: number
        tax_rate:
          type: number
        shipping:
          type: number
        total:
          type: number
        validated_at:
          type: string
    handler:
      callable: ecommerce_validate_cart
      initialization:
        scenario: ecommerce_checkout
    system_dependency:
    dependencies: []
    retry:
      retryable: true
      max_attempts: 2
      backoff: exponential
      backoff_base_ms: 100
      max_backoff_ms: 5000
    timeout_seconds: 10
    publishes_events: []

  - name: process_payment
    description: "Process customer payment using mock payment service"
    result_schema:
      type: object
      required:
        - payment_id
        - transaction_id
        - status
        - amount_charged
        - currency
        - payment_method_type
        - authorization_code
        - processed_at
      properties:
        payment_id:
          type: string
        transaction_id:
          type: string
        authorization_code:
          type: string
        amount_charged:
          type: number
        currency:
          type: string
          enum:
            - USD
        payment_method_type:
          type: string
        gateway_response:
          type: string
        status:
          type: string
          enum:
            - completed
        processed_at:
          type: string
    handler:
      callable: ecommerce_process_payment
      initialization:
        scenario: ecommerce_checkout
    system_dependency:
    dependencies:
      - validate_cart
    retry:
      retryable: true
      max_attempts: 2
      backoff: exponential
      backoff_base_ms: 100
      max_backoff_ms: 5000
    timeout_seconds: 10
    publishes_events: []

  - name: update_inventory
    description: "Reserve inventory for order items using mock inventory service"
    result_schema:
      type: object
      required:
        - updated_products
        - total_items_reserved
        - inventory_log_id
        - updated_at
      properties:
        updated_products:
          type: array
          items:
            type: object
            required:
              - product_id
              - sku
              - previous_quantity
              - new_quantity
              - reserved
            properties:
              product_id:
                type: string
              sku:
                type: string
              previous_quantity:
                type: integer
              new_quantity:
                type: integer
              reserved:
                type: integer
        total_items_reserved:
          type: integer
        inventory_changes:
          type: array
        inventory_log_id:
          type: string
        updated_at:
          type: string
    handler:
      callable: ecommerce_update_inventory
      initialization:
        scenario: ecommerce_checkout
    system_dependency:
    dependencies:
      - process_payment
    retry:
      retryable: true
      max_attempts: 2
      backoff: exponential
      backoff_base_ms: 100
      max_backoff_ms: 5000
    timeout_seconds: 10
    publishes_events: []

  - name: create_order
    description: "Create order record with customer, payment, and inventory details"
    result_schema:
      type: object
      required:
        - order_id
        - order_number
        - status
        - items
        - item_count
        - subtotal
        - tax
        - shipping
        - total
        - total_amount
        - customer_email
        - payment_id
        - transaction_id
        - authorization_code
        - inventory_log_id
        - estimated_delivery
        - created_at
      properties:
        order_id:
          type: string
        order_number:
          type: string
        customer_email:
          type: string
        items:
          type: array
          items:
            type: object
            required:
              - sku
              - name
              - quantity
              - unit_price
              - line_total
            properties:
              sku:
                type: string
              name:
                type: string
              quantity:
                type: integer
              unit_price:
                type: number
              line_total:
                type: number
        item_count:
          type: integer
        subtotal:
          type: number
        tax:
          type: number
        shipping:
          type: number
        total:
          type: number
        total_amount:
          type: number
        payment_id:
          type: string
        transaction_id:
          type: string
        authorization_code:
          type: string
        updated_products:
          type: array
        inventory_log_id:
          type: string
        status:
          type: string
          enum:
            - confirmed
        created_at:
          type: string
        estimated_delivery:
          type: string
    handler:
      callable: ecommerce_create_order
      initialization:
        scenario: ecommerce_checkout
    system_dependency:
    dependencies:
      - update_inventory
    retry:
      retryable: true
      max_attempts: 2
      backoff: exponential
      backoff_base_ms: 100
      max_backoff_ms: 5000
    timeout_seconds: 10
    publishes_events: []

  - name: send_confirmation
    description: "Send order confirmation email to customer using mock email service"
    result_schema:
      type: object
      required:
        - message_id
        - status
        - email_sent
        - recipient
        - subject
        - template
        - channel
        - sent_at
      properties:
        email_sent:
          type: boolean
        recipient:
          type: string
        email_type:
          type: string
        message_id:
          type: string
        subject:
          type: string
        body_preview:
          type: string
        channel:
          type: string
          enum:
            - email
        template:
          type: string
        status:
          type: string
          enum:
            - sent
        sent_at:
          type: string
    handler:
      callable: ecommerce_send_confirmation
      initialization:
        scenario: ecommerce_checkout
    system_dependency:
    dependencies:
      - create_order
    retry:
      retryable: true
      max_attempts: 2
      backoff: exponential
      backoff_base_ms: 100
      max_backoff_ms: 5000
    timeout_seconds: 10
    publishes_events: []

environments:
  test:
    steps:
      - name: validate_cart
        timeout_seconds: 10
      - name: process_payment
        timeout_seconds: 10
      - name: update_inventory
        timeout_seconds: 10
      - name: create_order
        timeout_seconds: 10
      - name: send_confirmation
        timeout_seconds: 10
